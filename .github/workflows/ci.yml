name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # package-lock.json is gitignored in this repo, so no npm ci / cache
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
